services:
  db:
    image: postgres:15-alpine
    container_name: stocksentinel-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stocksentinel
      POSTGRES_USER: stocksentinel
      POSTGRES_PASSWORD: stocksentinel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocksentinel -d stocksentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: stocksentinel-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://stocksentinel:stocksentinel_password@db:5432/stocksentinel
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: stocksentinel-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:

